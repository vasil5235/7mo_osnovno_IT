<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Chat App</title>
    <link rel="stylesheet" href="styleReport.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        /* Base reset and structure */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: #222;
            color: white;
            padding: 0.5rem 1rem;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .button {
            padding: 0.5rem 1rem;
            border: none;
            background-color: #444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }
        main
        {
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            width: 100%;
            min-height: 100%;



        }
        #searchbar
        {
            display: flex;
            margin: 1rem;
            align-items: center;
            justify-content: center;
        }
        #searchbar form input
        {
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        #reports-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            width: 100%;

            .reports
            {
                height: 10rem;
                border: 5px solid #222;
                flex: 0 1 20rem;
                background-color: #5f5f5f;
                padding: 0.5rem;
                border-radius: 7.5px;
                p{
                    color: white;
                    margin: 0;
                    font-size: 1.2rem;
                    margin-bottom: 0.5rem;
                }
            }

        }



        body
        {
         background-color: #2b2b2b;
        }

        #report-container {

            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            padding: 0 1rem 1rem 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            font-size : 1.5rem;
            display: flex;
            width: 35%;
            min-width: 10rem;
            background-color: #5f5f5f;
            flex-direction: column;
            align-items: center;
            div{
                font-size: 1.5rem;
                display: flex;
                flex-direction: column;
                justify-content: left;
                min-width: 70%;
                max-width: 70%;
                input{
                    min-width: 50%;
                }
                textarea{
                    min-width: 50%;
                    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
                }

            }

        }
        .reporter
        {

            border-radius: 10px;
            font-size : 1.5rem;
            width: 20vw;
            overflow-y: auto;
            height: 4rem;
            resize: none;

        }
    </style>
</head>
<body style="overflow-y: scroll;">
<header>
    <nav>
        <a href="../chat.html" target="_parent" style="color: #FFFFFF;"><button class="button">чат</button></a>
        <a href="reports.html" target="_parent" style="color: #FFFFFF;"><button class="button">доклади</button></a>

    </nav>
</header>
<main>
<div id="report-container">
    <div>
        <p>Заглавие</p>
        <textarea class="reporter" id="title"></textarea>
    </div>
    <div >
        <p>Кой докладва?</p>
        <textarea class="reporter" id="Person"></textarea>
    </div>
    <div>
        <p>Къде е станало?</p>
        <textarea class="reporter"  id="place"></textarea>
    </div>
    <div>
        <p>Какво стана</p>
        <textarea class="reporter" style="height: 10rem" id="accident"></textarea>
    </div>
    <div>
        <p>В колко часа стана?</p>
        <input type="datetime-local" class="reporter"  name="input1" value="2025-11-24T14:30" id="time">
    </div>
</div>
    <div style="display: flex; width: 35%;flex-wrap: nowrap; justify-content: left  ; margin-top: 0.5rem; margin-bottom: 0.5rem; gap:0.25rem">
        <button class="button" style="background: #228B22;" id="sendbtn">Send</button>

    </div>
</main>
</body>
<script>
    const title = document.getElementById('title');
    const person = document.getElementById('Person');
    const place = document.getElementById('place');
    const accident = document.getElementById('accident');
    const time = document.getElementById('time');
    const button = document.getElementById('sendbtn');


    button.addEventListener('click',async (e) => {
        e.preventDefault();
        const data =
            {
                title: title.value,
                person: person.value,
                place: place.value,
                accident: accident.value,
                time: time.value
            }
        let response = await fetch('http://localhost:3000/report', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(data)
        })
        if(response.ok)
        {
            window.alert("Успешно запазени промени!");
            window.location.href = 'reports.html';
        }
    })

</script>

</html>
