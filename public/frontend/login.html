<!DOCTYPE html>
<html lang="en">
<style>
    body {
        padding: 0;
        margin: 0;
        background-color: #a2a2a2;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: row;
        overflow-y: scroll;
    }

    #image {
        box-sizing: border-box;
        flex: 1;
        margin: 1vh 1vh 1vh 1vh;
        width: 48vw;
        height: 98vh;
        border-radius: 25px;
        border: 2px solid white;

    }

    #container {
        flex: 1;
        width: auto;
        height: auto;

        padding: 5rem 5rem 5rem 5rem;
    }

    #Login {

        h1 {
            margin: 0 0 10rem 0;
        }

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        form {

            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: start;
            row-gap: 0.5rem;

            input {
                width: 100%;
                height: 2rem;
            }

            button {
                width: 101%;
                padding: 0.5rem 1rem;
                border: none;
                background-color: #444;
                color: white;
                border-radius: 5px;
                cursor: pointer;
            }


        }
    }
</style>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<img id="image" src="http://localhost:3000/login/images">
<div id="container">

    <div id="Login">
        <h1 style="font-family: 'Fira Code' ">Добре дошли в LiftUp<!doctype html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
                <meta http-equiv="X-UA-Compatible" content="ie=edge">
                <title>Document</title>
            </head>
            <body>

            </body>
            </html>
        </h1>
        <form method="post">

            <input type="text" name="username" id="username" placeholder="Username" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <p style="color:red;margin: -0.5rem 0 -0.5rem 0;visibility: collapse" id="error_message">Грешно име или парола!</p>
            <button type="submit">Вписване</button>
        </form>
    </div>

 </body>
<script>

    const errormessage = document.getElementById('error_message');
    const form = document.querySelector('form');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        let url = process.env.IP;

        try {
            const response = await fetch(`${url}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                // REDIRECT: Go to the /chat route defined in Express
                window.location.href = '/chat.html';
             }
            else
            {
                window.location.href = '/Sfrontend/report.html';
            }
            //else {
            //     // Show error message
            //     errormessage.style.visibility = 'visible';
            // }
        } catch (error) {
            console.error("Connection error:", error);
        }
    });
</script>
</html>
